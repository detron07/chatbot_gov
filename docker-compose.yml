version: '3.8'

services:
  pgvector:
    image: ankane/pgvector:v0.5.1
    container_name: gov_cache_pgvector
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
      POSTGRES_DB: semantic_cache
    ports:
      - "5432:5432"
    volumes:
      - pgvector-data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgvector-data:
